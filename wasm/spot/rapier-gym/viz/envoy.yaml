# Envoy gRPC-Web proxy for Rerun training dashboard
#
# Translates browser HTTP/1.1 (gRPC-Web) to HTTP/2 gRPC for the Rerun
# data server. Required because Cloudflare Tunnel only proxies HTTP/1.1.
#
# Architecture:
#   Browser -> Cloudflare Tunnel -> rerun-data.casazza.io
#     -> Envoy (port 9898, gRPC-Web filter)
#     -> Rerun gRPC (port 9897)
#
# Run: envoy -c viz/envoy.yaml
# Or:  docker run --rm --network host -v $(pwd)/viz/envoy.yaml:/etc/envoy/envoy.yaml envoyproxy/envoy

static_resources:
  listeners:
  - address:
      socket_address:
        address: 0.0.0.0
        port_value: 9898
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: grpc_web
          codec_type: AUTO
          http_filters:
          - name: envoy.filters.http.grpc_web
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
          - name: envoy.filters.http.cors
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          route_config:
            virtual_hosts:
            - name: grpc
              domains: ["*"]
              cors:
                allow_origin_string_match:
                - prefix: "https://rerun.casazza.io"
                - safe_regex:
                    regex: ".*"
                allow_methods: "GET, PUT, DELETE, POST, OPTIONS"
                allow_headers: "content-type,x-grpc-web,x-user-agent,grpc-timeout,x-rerun-ws"
                expose_headers: "grpc-status,grpc-message"
                max_age: "86400"
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: rerun_grpc
                  timeout: 0s
                  max_stream_duration:
                    grpc_timeout_header_max: 0s

  clusters:
  - name: rerun_grpc
    type: STATIC
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: rerun_grpc
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 9897
