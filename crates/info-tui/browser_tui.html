<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link data-trunk rel="rust" />
    <title>olive casazza — terminal</title>
    <style>
      :root {
        background: #000;
        color: #d1d5db;
        font-family: "Fira Code", "JetBrains Mono", monospace;
        font-size: 14px;
        cursor: default;
      }
      * { box-sizing: border-box; user-select: none; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; }
      #info-tui {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        cursor: default;
        user-select: none;
      }
      #info-tui_ratzilla_grid, #grid { width: 100%; height: 100%; }
      pre { margin: 0; padding: 0; border: 0; font-family: inherit; font-size: 1rem; line-height: normal; }
      span { line-height: normal; }
    </style>
  </head>
  <body>
    <main id="info-tui" aria-label="info terminal"></main>
    <script>
      const notifyResize = () => requestAnimationFrame(() => {
        window.dispatchEvent(new Event("resize"));
      });
      window.visualViewport?.addEventListener("resize", notifyResize);
      window.addEventListener("orientationchange", notifyResize);
      window.addEventListener("TrunkApplicationStarted", notifyResize);
    </script>
  </body>
</html>
