name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: info
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      # Build the Dioxus site via crane/trunk (includes all WASM)
      - name: Build site
        run: nix build .#info-ui --out-link result

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: result
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment: cloudflare
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: dist

      - name: Create _redirects
        run: |
          # Cloudflare Pages serves existing files first, but we need explicit rules
          # to prevent the SPA fallback from catching missing dynamic imports
          cat > dist/_redirects << 'EOF'
          # Static assets - let them 404 if missing (don't serve HTML)
          /notebooks/*/static/*  /notebooks/:splat/static/:splat  404
          /*.js  /:splat.js  404
          /*.css  /:splat.css  404
          /*.wasm  /:splat.wasm  404
          # SPA fallback for client-side routes
          /*  /index.html  200
          EOF

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy dist --project-name=info
