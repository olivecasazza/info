name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: info
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      # Build WASM packages and sync to app/ui/public/wasm
      - name: Build WASM packages
        run: |
          nix build .#flock-wasm-pkg .#pipedream-wasm-pkg --no-link
          nix run .#sync-wasm

      # Build the Dioxus site with trunk
      - name: Build site
        run: |
          cd app/ui
          nix develop --command trunk build --release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: app/ui/dist
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment: cloudflare
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: dist

      - name: Create _redirects
        run: |
          # SPA fallback for client-side routes
          echo "/*  /index.html  200" >> dist/_redirects

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy dist --project-name=info
